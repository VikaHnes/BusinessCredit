<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusinessCredit — Калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="inner-header">
    <div class="container">
      <div class="top-bar">
        <h1 class="logo">BusinessCredit</h1>
        <nav class="nav">
          <a href="index.html">Головна</a>
          <a href="calculator.html" class="active">Калькулятор</a>
          <a href="about.html">Про сервіс</a>
          <a href="contacts.html">Контакти</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container main-content">
    <section class="calculator-card">
      <h2>Калькулятор бізнес-кредиту</h2>

      <div class="form-group">
        <label for="amount">Сума кредиту (грн)</label>
        <input type="number" id="amount" placeholder="Наприклад, 300000">
      </div>

      <div class="form-group">
        <label for="term">Термін кредиту (місяців)</label>
        <input type="number" id="term" placeholder="Наприклад, 24">
      </div>

      <div class="form-group">
        <label for="rate">Річна відсоткова ставка (%)</label>
        <input type="number" id="rate" step="0.01" placeholder="Наприклад, 18">
      </div>

      <button id="calculateBtn">Розрахувати</button>

      <div class="result-box">
        <h3>Результат</h3>
        <p><strong>Щомісячний платіж:</strong> <span id="monthlyPayment">—</span></p>
        <p><strong>Загальна сума виплат:</strong> <span id="totalPayment">—</span></p>
        <p><strong>Переплата:</strong> <span id="overpayment">—</span></p>
      </div>

      <p class="note">
        Розрахунок виконується за ануїтетною формулою.
      </p>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© Гнесь Вікторія, група FEMP_14_22_B_D, 2026</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
